<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>放手之旅 — 小組件</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background: transparent;
    color: #e0e0e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .widget {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 20px;
    padding: 16px;
    width: 100%;
    max-width: 360px;
    border: 1px solid rgba(255,255,255,.08);
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .widget-title {
    font-size: .85rem;
    font-weight: 600;
    color: #7c5cfc;
  }
  .widget-day {
    font-size: .75rem;
    color: #888;
    background: rgba(255,255,255,.06);
    padding: 4px 10px;
    border-radius: 10px;
  }
  .widget-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .widget-progress-bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .widget-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7c5cfc, #5c3cfc);
    border-radius: 3px;
    transition: width .5s ease;
  }
  .widget-progress-text {
    font-size: .7rem;
    color: #888;
    white-space: nowrap;
  }
  .widget-phase {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: .8rem;
    color: #aaa;
    margin-bottom: 10px;
  }
  .widget-today {
    font-size: .95rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }
  .widget-affirmation {
    font-size: .8rem;
    color: #7c5cfc;
    font-style: italic;
    line-height: 1.5;
    padding: 10px;
    background: rgba(124,92,252,.08);
    border-radius: 10px;
    border: 1px solid rgba(124,92,252,.12);
  }
  .widget-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 8px;
    background: rgba(124,92,252,.15);
    color: #7c5cfc;
    font-size: .7rem;
    margin-top: 8px;
  }
  .widget-refresh {
    text-align: center;
    margin-top: 10px;
    font-size: .65rem;
    color: #555;
  }
  .widget-empty {
    text-align: center;
    padding: 20px;
    color: #888;
    font-size: .85rem;
  }
  .loading {
    text-align: center;
    padding: 20px;
    color: #888;
  }
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="loading">載入中...</div>
</div>

<script>
async function loadWidget() {
  try {
    const resp = await fetch('/api/widget');
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();
    
    document.getElementById('widget').innerHTML = `
      <div class="widget-header">
        <span class="widget-title">🕊️ 放手之旅</span>
        <span class="widget-day">第 ${data.day} 天</span>
      </div>
      <div class="widget-progress">
        <div class="widget-progress-bar">
          <div class="widget-progress-fill" style="width:${data.progress_pct}%"></div>
        </div>
        <span class="widget-progress-text">${data.progress}</span>
      </div>
      <div class="widget-phase">
        <span>${data.phase_icon}</span>
        <span>${data.phase_name}</span>
      </div>
      <div class="widget-today">📖 ${data.title}</div>
      <div class="widget-affirmation">${data.affirmation}</div>
      <span class="widget-badge">${data.badge}</span>
      <div class="widget-refresh">🔄 自動更新 · ${new Date().toLocaleTimeString()}</div>
    `;
  } catch(e) {
    document.getElementById('widget').innerHTML = `
      <div class="widget-empty">
        <div style="font-size:2rem;margin-bottom:8px">🕊️</div>
        <div>放手之旅</div>
        <div style="font-size:.75rem;margin-top:4px">啟動遊戲以查看今日任務</div>
      </div>
    `;
  }
}

loadWidget();
// Auto refresh every 30 minutes
setInterval(loadWidget, 1800000);
</script>
</body>
</html>
